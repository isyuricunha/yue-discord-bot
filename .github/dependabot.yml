version: 2
updates:
  # Enable version updates for npm - unified configuration
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "isyuricunha"
    assignees:
      - "isyuricunha"
    commit-message:
      prefix: "deps"
      include: "scope"
    allow:
      - dependency-type: "all"
    ignore:
      # Ignore patch updates for stable packages to avoid noise
      - dependency-name: "typescript"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-patch"]
    
  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    reviewers:
      - "isyuricunha"
    assignees:
      - "isyuricunha"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "github-actions"
      - "automated"
